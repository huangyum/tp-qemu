- cpu_model:
    type = cpu_model
    auto_cpu_model = "no"
    cpu_model_flags += ",enforce"
    reboot_method = "shell"
    variants:
        - skylake_server_ibrs:
            cpu_model = Skylake-Server-IBRS
            flags = "pdpe1gb clwb avx512f avx512dq avx512bw avx512cd avx512vl"
        - skylake_client_ibrs:
            cpu_model = Skylake-Client-IBRS
            flags = "xsavec xgetbv1 ibrs ibpb"
        - broadwell_ibrs:
            cpu_model = Broadwell-IBRS
            flags = "adx rdseed 3dnowprefetch smap ibrs ibpb"
        - broadwell_notsx_ibrs:
            cpu_model = Broadwell-noTSX-IBRS
            flags = "adx rdseed 3dnowprefetch smap ibrs ibpb"
            no_flags = "hle rtm"
        - haswell_ibrs:
            cpu_model = Haswell-IBRS
            flags = "vme sse2 sse fxsr mmx clflush pse36 pat cmov mca pge mtrr sep apic cx8 mce pae msr tsc pse de fpu avx xsave aes tsc_deadline_timer fma movbe popcnt x2apic sse4_2 sse4_1 cx16 ssse3 pclmulqdq pni f16c rdrand fsgsbase bmi1 hle avx2 smep bmi2 erms invpcid rtm lm rdtscp nx syscall lahf_lm xsaveopt arat pcid ibpb"
        - haswell_notsx_ibrs:
            cpu_model = Haswell-noTSX-IBRS
            no_flags = "hle rtm"
        - ivybridge_ibrs:
            cpu_model = IvyBridge-IBRS
            flags = "vme sse2 sse fxsr mmx clflush pse36 pat cmov mca pge mtrr sep apic cx8 mce pae msr tsc pse de fpu avx xsave aes tsc_deadline_timer popcnt x2apic sse4_2 sse4_1 cx16 ssse3 pclmulqdq pni rdrand fsgsbase smep erms lm rdtscp nx syscall lahf_lm xsaveopt arat f16c ibpb ibrs"
        - nehalem_ibrs:
            cpu_model = Nehalem-IBRS
            flags = "vme sse2 sse fxsr mmx clflush pse36 pat cmov mca pge mtrr sep apic cx8 mce pae msr tsc pse de fpu popcnt x2apic sse4_2 sse4_1 cx16 ssse3 pni lm nx syscall lahf_lm ibpb ibrs"
        - sandybridge_ibrs:
            cpu_model = SandyBridge-IBRS
            flags = "vme sse2 sse fxsr mmx clflush pse36 pat cmov mca pge mtrr sep apic cx8 mce pae msr tsc pse de fpu avx xsave aes tsc_deadline_timer popcnt x2apic sse4_2 sse4_1 cx16 ssse3 pclmulqdq pni lm rdtscp nx syscall lahf_lm xsaveopt arat ibpb ibrs"
